<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Stok Strip Pro - Cloud Edition</title>
    <style>
        /* CSS REFINED - MENGGUNAKAN STYLE LAMA ANDA */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background: #f1f5f9; height: 100vh; display: flex; flex-direction: column; overflow: hidden; position: fixed; width: 100%; }
        #app-content { display: flex; flex-direction: column; height: 100vh; width: 100%; overflow: hidden; position: relative; }
        .header { background: #3b5998; color: white; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; font-weight: 700; flex-shrink: 0; }
        .sub-header-blue { background: #2563eb; color: white; padding: 10px 20px; font-weight: 600; font-size: 0.9rem; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
        .menu-btn { background: rgba(255,255,255,0.2); border: none; color: white; font-size: 1.4rem; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .menu-dropdown { position: absolute; top: 60px; right: 16px; background: white; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 240px; z-index: 1000; display: none; border: 1px solid #e2e8f0; overflow: hidden; }
        .menu-dropdown.show { display: block; }
        .menu-item { padding: 12px 16px; display: flex; align-items: center; gap: 12px; font-weight: 500; cursor: pointer; border-bottom: 1px solid #f1f5f9; color: #333; font-size: 0.9rem; }
        .tabs { display: flex; background: white; border-bottom: 1px solid #e2e8f0; overflow-x: auto; flex-shrink: 0; }
        .tab { flex: 1; padding: 15px 5px; font-weight: 700; color: #64748b; border-bottom: 3px solid transparent; cursor: pointer; text-align: center; font-size: 0.8rem; white-space: nowrap; }
        .tab.active { border-bottom: 3px solid #2563eb; color: #2563eb; }
        .main-content { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .form-label { font-weight: 700; font-size: 0.75rem; color: #64748b; margin-bottom: 8px; display: block; }
        .form-input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #e2e8f0; margin-bottom: 18px; font-size: 1rem; outline: none; }
        .photo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .photo-box { border: 2px dashed #cbd5e1; border-radius: 12px; height: 110px; position: relative; display: flex; align-items: center; justify-content: center; background: #f8fafc; cursor: pointer; overflow: hidden; }
        .photo-box img { width: 100%; height: 100%; object-fit: cover; }
        .photo-label { font-size: 0.7rem; font-weight: bold; color: #64748b; position: absolute; }
        .btn-primary { width: 100%; padding: 16px; background: #2563eb; color: white; border: none; border-radius: 12px; font-weight: 700; font-size: 1rem; cursor: pointer; }
        .product-item { background: white; border-radius: 18px; padding: 12px; margin-bottom: 12px; border: 1px solid #e2e8f0; display: flex; align-items: center; gap: 12px; }
        .prod-img-stack { position: relative; width: 70px; height: 70px; flex-shrink: 0; }
        .prod-img-main { width: 70px; height: 70px; border-radius: 12px; object-fit: cover; }
        .prod-img-sub { position: absolute; right: -4px; bottom: -4px; width: 35px; height: 35px; border-radius: 8px; border: 2px solid white; object-fit: cover; }
        .prod-info { flex: 1; }
        .stock-ctrl { display: flex; align-items: center; gap: 6px; }
        .btn-s { width: 34px; height: 34px; border-radius: 10px; border: 1px solid #e2e8f0; background: white; font-weight: bold; cursor: pointer; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; border-top: 1px solid #e2e8f0; height: 75px; z-index: 100; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #94a3b8; font-weight: 700; font-size: 0.75rem; gap: 4px; cursor: pointer; }
        .nav-item.active { color: #2563eb; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="app-content">
    <div class="header">
        <div>Striping Pro Cloud</div>
        <button class="menu-btn" onclick="toggleMenu()">⋮</button>
    </div>
    <div class="sub-header-blue">⚡ STOK REALTIME</div>

    <div id="menuDropdown" class="menu-dropdown">
        <div class="menu-item" onclick="exportData()">💾 Export Backup (JSON)</div>
    </div>

    <div id="tabs-container" class="tabs hidden"></div>

    <div class="main-content">
        <div id="screen-add">
            <div class="card">
                <h3 id="form-title" style="margin-bottom:15px;">Tambah Produk</h3>
                <input type="hidden" id="f-id">
                <label class="form-label">MEREK MOTOR</label>
                <select id="f-kategori" class="form-input">
                    <option value="HONDA">HONDA</option>
                    <option value="YAMAHA">YAMAHA</option>
                    <option value="SUZUKI">SUZUKI</option>
                    <option value="KAWASAKI">KAWASAKI</option>
                </select>
                <label class="form-label">NAMA PRODUK</label>
                <input type="text" id="f-nama" class="form-input" placeholder="Nama Produk...">
                
                <div class="photo-grid">
                    <div class="photo-box" onclick="document.getElementById('in-img-1').click()">
                        <img id="prev-1" class="hidden">
                        <div id="lab-1" class="photo-label">📷 FOTO 1</div>
                        <input type="file" id="in-img-1" accept="image/*" class="hidden" onchange="handleImage(this, 1)">
                    </div>
                    <div class="photo-box" onclick="document.getElementById('in-img-2').click()">
                        <img id="prev-2" class="hidden">
                        <div id="lab-2" class="photo-label">📷 FOTO 2</div>
                        <input type="file" id="in-img-2" accept="image/*" class="hidden" onchange="handleImage(this, 2)">
                    </div>
                </div>
                <button class="btn-primary" onclick="simpanKeFirebase()">SIMPAN KE CLOUD</button>
            </div>
        </div>

        <div id="screen-list" class="hidden">
            <input type="text" id="q-search" class="form-input" style="border-radius:25px;" placeholder="🔍 Cari barang..." oninput="renderProduk()">
            <div id="list-render"></div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="navKe('add')" id="nav-add"><span>➕</span>TAMBAH</div>
        <div class="nav-item" onclick="navKe('list')" id="nav-list"><span>📦</span>STOK</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, remove, update } 
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // KONFIGURASI FIREBASE ANDA
    const firebaseConfig = {
        apiKey: "AIzaSyA_5FPWuq3YwP0b3pUouhTLE87WFlmoIIU",
        authDomain: "striping-57c17.firebaseapp.com",
        databaseURL: "https://striping-57c17-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "striping-57c17",
        storageBucket: "striping-57c17.firebasestorage.app",
        messagingSenderId: "1052266029221",
        appId: "1:1052266029221:web:02b74ab13c787c90f02d4c",
        measurementId: "G-2WTTSQ33GT"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let img1 = "", img2 = "";
    let curCat = "HONDA";
    let allData = {};

    // --- FUNGSI NAVIGASI ---
    window.navKe = function(page) {
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        document.getElementById('nav-'+page).classList.add('active');
        document.getElementById('screen-add').classList.toggle('hidden', page !== 'add');
        document.getElementById('screen-list').classList.toggle('hidden', page !== 'list');
        document.getElementById('tabs-container').classList.toggle('hidden', page !== 'list');
        if(page === 'list') { renderTabs(); renderProduk(); }
    };

    window.toggleMenu = function() { document.getElementById('menuDropdown').classList.toggle('show'); };

    window.renderTabs = function() {
        const cats = ["HONDA", "YAMAHA", "SUZUKI", "KAWASAKI"];
        document.getElementById('tabs-container').innerHTML = cats.map(c => 
            `<div class="tab ${c === curCat ? 'active' : ''}" onclick="window.setCat('${c}')">${c}</div>`
        ).join('');
    };

    window.setCat = function(c) { curCat = c; renderTabs(); renderProduk(); };

    // --- PROSES GAMBAR ---
    window.handleImage = function(input, index) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const imgObj = new Image();
                imgObj.onload = function() {
                    const canvas = document.createElement('canvas');
                    const maxW = 500; // Kompres agar hemat database
                    const scale = maxW / imgObj.width;
                    canvas.width = maxW;
                    canvas.height = imgObj.height * scale;
                    canvas.getContext('2d').drawImage(imgObj, 0, 0, canvas.width, canvas.height);
                    const data = canvas.toDataURL('image/jpeg', 0.7);
                    if(index === 1) img1 = data; else img2 = data;
                    document.getElementById('prev-'+index).src = data;
                    document.getElementById('prev-'+index).classList.remove('hidden');
                    document.getElementById('lab-'+index).classList.add('hidden');
                };
                imgObj.src = e.target.result;
            };
            reader.readAsDataURL(input.files[0]);
        }
    };

    // --- SIMPAN KE FIREBASE ---
    window.simpanKeFirebase = function() {
        const nama = document.getElementById('f-nama').value;
        const kategori = document.getElementById('f-kategori').value;
        
        if(!nama || !img1) return alert("Nama dan Foto 1 wajib ada!");

        const listRef = ref(db, 'stok_strip_pro');
        push(listRef, {
            nama: nama,
            kategori: kategori,
            img1: img1,
            img2: img2,
            stok: 0,
            waktu: Date.now()
        }).then(() => {
            alert("Berhasil simpan ke Cloud!");
            resetForm();
            navKe('list');
        });
    };

    function resetForm() {
        document.getElementById('f-nama').value = "";
        img1 = ""; img2 = "";
        document.getElementById('prev-1').classList.add('hidden');
        document.getElementById('prev-2').classList.add('hidden');
        document.getElementById('lab-1').classList.remove('hidden');
        document.getElementById('lab-2').classList.remove('hidden');
    }

    // --- AMBIL DATA REALTIME ---
    onValue(ref(db, 'stok_strip_pro'), (snapshot) => {
        allData = snapshot.val() || {};
        renderProduk();
    });

    window.renderProduk = function() {
        const q = document.getElementById('q-search').value.toLowerCase();
        const container = document.getElementById('list-render');
        container.innerHTML = "";

        Object.keys(allData).reverse().forEach(key => {
            const item = allData[key];
            if(item.kategori === curCat && item.nama.toLowerCase().includes(q)) {
                container.innerHTML += `
                    <div class="product-item">
                        <div class="prod-img-stack">
                            <img src="${item.img1}" class="prod-img-main">
                            ${item.img2 ? `<img src="${item.img2}" class="prod-img-sub">` : ''}
                        </div>
                        <div class="prod-info">
                            <div style="font-weight:700;">${item.nama}</div>
                            <div style="font-size:0.8rem; color:gray;">Stok: <b class="text-blue-600">${item.stok}</b></div>
                        </div>
                        <div class="stock-ctrl">
                            <button class="btn-s" onclick="window.updateStok('${key}', -1)">−</button>
                            <button class="btn-s" onclick="window.updateStok('${key}', 1)">+</button>
                            <button class="btn-s" style="color:red" onclick="window.hapusItem('${key}')">🗑️</button>
                        </div>
                    </div>
                `;
            }
        });
    };

    window.updateStok = function(key, val) {
        const newStok = Math.max(0, (allData[key].stok || 0) + val);
        update(ref(db, 'stok_strip_pro/' + key), { stok: newStok });
    };

    window.hapusItem = function(key) {
        if(confirm("Hapus barang ini dari cloud?")) remove(ref(db, 'stok_strip_pro/' + key));
    };
    
    window.exportData = function() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(allData));
        const downloadAnchorNode = document.createElement('a');
        downloadAnchorNode.setAttribute("href", dataStr);
        downloadAnchorNode.setAttribute("download", "backup_stok_cloud.json");
        downloadAnchorNode.click();
    };
</script>
</body>
</html>
